<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <title>Local Storage</title>
</head>

<body>
    <section class="container mt-5">
        <h1>Local Storage: Saving, Retrieving and Clearing Data</h1>
        <form class="container mt-5">
            <div class="input-group mb-3">
                <label for="usurname" class="input-group-text">username</label>
                <input type="text" name="username" id="userName" class="form-control" placeholder="thomas1234">
            </div>
            <div class="d-flex justify-content-end">
                <button id="saveButton" class="btn btn-primary m-1">Save Data</button>
                <button id="loadButton" class="btn btn-secondary m-1">Load Data</button>
                <button id="clearButton" class="btn btn-danger m-1">Clear Data</button>
            </div>
        </form>

        <div class="container mt-5 bg-light" style="height: 80px;">
            <h3>Result</h3>
            <p id="result"></p>
        </div>
    </section>


    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script src="./scripts/localStorage.js"></script>
</body>

</html>
