<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/styles.css">
    <title>Registration – Pawfect Pets</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Pawfect Pets</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="pet-reg.html">Registration</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="services.html">Services</a>
                    </li>
                </ul>
            </div>
        </div>
        <div>
            <button class="btn btn-primary" id="changeModeButton">☀ Light Mode</button>
        </div>
    </nav>

    <!-- PAGE HEADER -->
    <div class="page-header">
        <div class="container">
            <h1>Pet Registration</h1>
            <p>Register your pet and book a grooming appointment.</p>
        </div>
    </div>

    <div class="content-area">
        <div class="container">
            <div class="row g-4 mb-4">

                <!-- PETS LIST -->
                <div class="col-lg-3">
                    <div class="card-box">
                        <h6>Registered Pets</h6>
                        <ol id="petsList"></ol>
                    </div>
                </div>

                <!-- FORM -->
                <div class="col-lg-9">
                    <div class="card-box">
                        <h5>New Registration</h5>
                        <form class="bg-light border p-3 mt-2">
                            <div class="mb-3">
                                <label class="form-lable">name</label>
                                <input class="form-control" type="text" name="name" placeholder="your dogs name">
                            </div>
                            <div class="mb-3">
                                <label class="form-lable">breed</label>
                                <input class="form-control" type="text" name="breed" placeholder="your dogs breed">
                            </div>
                            <div class="mb-3">
                                <label class="form-lable">Age</label>
                                <input class="form-control" type="number" name="age" placeholder="your dogs Age">
                            </div>
                            <div class="mb-3">
                                <label class="form-lable">gender</label>
                                <select class="form-select" name="gender">
                                    <option value="">select your dogs gender</option>
                                    <option value="female">female</option>
                                    <option value="male">male</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-lable">service</label>
                                <select class="form-select" name="service">
                                    <option value="">select a service for your dog</option>
                                    <option value="bath">Full Grooming</option>
                                    <option value="haircut">Bath & Dry</option>
                                    <option value="haircut">Nail Trim</option>
                                </select>
                            </div>
                            <div class="d-flex justify-content-end">
                                <button class="btn btn-secondary m-1" type="reset">reset</button>
                                <button onclick="registerPet(event)" class="btn btn-primary m-1"
                                    type="submit">register</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- TABLE -->
            <div class="card-box">
                <h5>Registered Pets</h5>
                <table class="table table-bordered">
                    <tr>
                        <th>Name</th>
                        <th>breed</th>
                        <th>age</th>
                        <th>gender</th>
                        <th>service</th>
                        <th>delete</th>
                    </tr>
                    <tbody id="body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./scripts/registration.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="./scripts/salon.js"></script>
    <script>displaySalonInfo();</script>
</body>

</html>
