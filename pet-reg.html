<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title></title>

</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Pet Salon</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="registration.html">Registration</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="services.html">Services</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section>
        <h2>Registered Pets</h2>

        <div id="petsContainer">
            <ol id="petsList">

            </ol>
        </div>
    </section>

    <section class="m-5">
        <h1>Registration</h1>

        <form class="bg-light border p-3 mt-5 ">
            <div class="mb-3">
                <label class="form-lable">name</label>
                <input class="form-control" type="text" name="name" id="" placeholder="your dogs name">
            </div>

            <div class="mb-3">
                <label class="form-lable">breed</label>
                <input class="form-control" type="text" name="breed" id="" placeholder="your dogs name">
            </div>

            <div class="mb-3">
                <label class="form-lable">Age</label>
                <input class="form-control" type="number" name="age" id="" placeholder="your dogs Age">
            </div>

            <div class="mb-3">
                <label class="form-lable">gender</label>
                <select class="form-select" name="gender" id="">
                    <option value="">select your dogs gender</option>
                    <option value="female">female</option>
                    <option value="male">male</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-lable">service</label>
                <select class="form-select" name="service" id="">
                    <option value="">select a service for your dog</option>
                    <option value="bath">bath</option>
                    <option value="haircut">haircut</option>
                </select>
            </div>

            <div class="d-flex justify-content-end">
                <button class="btn btn-secondary m-1" type="reset">reset</button>
                <button onclick="registerPet(event)" class="btn btn-primary m-1" type="submit">register</button>
            </div>
        </form>

    </section>

    <section class="m-4">
        <h2>register pets</h2>

        <table class="table table-bordered">
            <!--header-->
            <tr>
                <th>Name</th>
                <th>breed</th>
                <th>age</th>
                <th>gender</th>
                <th>service</th>
            </tr>

            <!--body-->
            <tbody id="body">
            </tbody>

        </table>

    </section>

    <p id="salonInfo"></p>

    <script src="./scripts/registration.js"></script>
    <script src="./scripts/salon.js"></script>

    <script>
        displaySalonInfo();
    </script>

</body>

</html>
